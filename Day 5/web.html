<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inline and Block Elements - HTML</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <p>Hey I am a para</p> <!-- p is a block-level element -->
    <a href="https://google.com">Google</a> <!-- a is an inline-level element -->
    <div> I am a block element</div> <!-- div is a block-level element -->
    <span>I am span and I am inline</span> <!-- span is an inline-level element -->
    <a href="">yes he is inline</a> <!-- a is an inline-level element -->

  

</body>

</html>
